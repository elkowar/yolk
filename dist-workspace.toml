[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The archive format to use for windows builds (defaults .zip)
windows-archive = ".zip"
# Whether failing tasks should make us give up on all other tasks
fail-fast = true
# Whether to enable GitHub Attestations
github-attestations = true
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# Which actions to run on pull requests
pr-run-mode = "plan"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "homebrew"]
# Customize the Homebrew formula name
formula = "yolk"
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-unknown-linux-musl", "x86_64-pc-windows-msvc", "aarch64-linux-android"]
# Steps run before `dist build` (used to set up the Android NDK for the
# aarch64-linux-android cross-build; a no-op for all other targets).
github-build-setup = "../build-setup.yml"
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false
# A GitHub repo to push Homebrew formulas to
tap = "elkowar/homebrew-tap"
# Publish jobs to run in CI
publish-jobs = ["homebrew"]
# Post-announce jobs: patch Homebrew formula after publishing
post-announce-jobs = ["./patch-homebrew-formula"]

[dist.github-custom-runners]
# Use an `ubuntu-latest` runner for all "global" steps of the release process,
# rather than cargo-dist's default of using the oldest possible Linux runner.
# This includes `plan`, `build-global-artifacts`, `host`, and `announce`, none
# of which actually rely on the specific Linux version.
global = "ubuntu-latest"
local = "ubuntu-latest"
x86_64-unknown-linux-gnu = "ubuntu-latest"
# The Android NDK only ships a linux-x86_64 host toolchain (there is no
# linux-aarch64 NDK), so cross-build aarch64-linux-android on an x86_64 runner
# rather than cargo-dist's default aarch64 Linux runner.
aarch64-linux-android = "ubuntu-22.04"
